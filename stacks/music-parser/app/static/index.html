<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Parser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f8f8f8;
      --surface:   #ffffff;
      --border:    #dde1e7;
      --accent:    #6c63ff;
      --accent-h:  #574fd6;
      --text:      #1a1a2e;
      --muted:     #6b7280;
      --success:   #16a34a;
      --error:     #dc2626;
      --radius:    14px;
      --shadow:    0 2px 16px rgba(0,0,0,.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Logo / heading ─────────────────────────────────────────────────── */
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo svg { width: 56px; height: 56px; margin-bottom: 10px; }
    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p { color: var(--muted); font-size: .9rem; margin-top: 4px; }

    /* ── Card ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 36px;
      width: 100%;
      max-width: 620px;
    }

    /* ── URL field ──────────────────────────────────────────────────────── */
    .url-row {
      display: flex;
      gap: 10px;
    }
    .url-row input {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 14px 20px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .url-row input:focus { border-color: var(--accent); }
    .url-row input::placeholder { color: var(--muted); }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      padding: 14px 22px;
      transition: background .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { background: #c4c4d4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 8px 14px;
      font-size: .8rem;
    }
    .btn-ghost:hover { background: #f0eeff; }

    /* ── Advanced section ───────────────────────────────────────────────── */
    .advanced-toggle {
      margin-top: 12px;
      text-align: center;
    }

    .advanced-panel {
      display: none;
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .advanced-panel.open { display: block; }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .field input {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: #b0b4bb; }

    .section-label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin: 12px 0 6px;
    }

    /* ── Status box ─────────────────────────────────────────────────────── */
    #status {
      display: none;
      margin-top: 20px;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: .9rem;
      align-items: center;
      gap: 10px;
    }
    #status.show { display: flex; }
    #status.pending, #status.downloading {
      background: #ede9fe;
      color: #4c1d95;
    }
    #status.done    { background: #dcfce7; color: #14532d; }
    #status.error   { background: #fee2e2; color: #7f1d1d; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <div class="logo">
    <!-- Headphones icon -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 18v-6a9 9 0 0 1 18 0v6" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3v5Z" fill="url(#g2)"/>
      <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3v5Z" fill="url(#g3)"/>
      <defs>
        <linearGradient id="g"  x1="3" y1="6" x2="21" y2="18" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6c63ff"/><stop offset="1" stop-color="#a78bfa"/>
        </linearGradient>
        <linearGradient id="g2" x1="18" y1="14" x2="23" y2="21" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6c63ff"/><stop offset="1" stop-color="#a78bfa"/>
        </linearGradient>
        <linearGradient id="g3" x1="3" y1="14" x2="8" y2="21" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6c63ff"/><stop offset="1" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
    </svg>
    <h1>Music Parser</h1>
    <p>Paste a URL from YouTube, SoundCloud, Rutube and more</p>
  </div>

  <div class="card">

    <div class="url-row">
      <input id="url"
             type="url"
             placeholder="https://www.youtube.com/watch?v=…"
             autocomplete="off"
             autofocus />
      <button class="btn btn-primary" id="downloadBtn" onclick="startDownload()">Download</button>
    </div>

    <div class="advanced-toggle">
      <button class="btn btn-ghost" onclick="toggleAdvanced()">⚙ Options</button>
    </div>

    <div class="advanced-panel" id="advancedPanel">
      <div class="section-label">Trim</div>
      <div class="fields-grid">
        <div class="field">
          <label>Start time</label>
          <input id="startTime" type="text" placeholder="1:30 or 0:01:30" />
        </div>
        <div class="field">
          <label>End time</label>
          <input id="endTime" type="text" placeholder="2:00:00" />
        </div>
      </div>

      <div class="section-label" style="margin-top:16px;">Metadata</div>
      <div class="fields-grid">
        <div class="field">
          <label>Title</label>
          <input id="metaTitle" type="text" placeholder="My DJ Set" />
        </div>
        <div class="field">
          <label>Artist</label>
          <input id="metaArtist" type="text" placeholder="DJ Name" />
        </div>
        <div class="field" style="grid-column: span 2;">
          <label>Album</label>
          <input id="metaAlbum" type="text" placeholder="Album or Event Name" />
        </div>
      </div>
    </div>

    <div id="status"></div>

  </div>

  <footer>
    Saves audio to your Navidrome library &nbsp;·&nbsp;
    Supports YouTube, SoundCloud, Rutube, Bandcamp &amp; <a href="https://github.com/yt-dlp/yt-dlp/blob/master/supportedsites.md" target="_blank">1000+ sites</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>

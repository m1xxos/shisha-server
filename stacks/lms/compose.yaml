services:
  api:
    image: ghcr.io/${GHCR_OWNER:-m1xxos}/lms-parser-api:${IMAGE_TAG:-latest}
    container_name: lms-parser-api
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:-4000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_SECRET: ${APP_SECRET:-change-me}
      EXPORT_DIR: ${EXPORT_DIR:-/app/exports}
    expose:
      - "4000"
    networks:
      - lms
      - traefik_proxy
    depends_on:
      redis:
        condition: service_started
    volumes:
      - exports_data:/app/exports
    labels:
    - "traefik.enable=true"
    - "traefik.http.routers.lms-api.entrypoints=websecure"
    - "traefik.http.routers.lms-api.rule=Host(`api.lms.m1xxos.online`)"
    - "traefik.http.services.lms-api.loadbalancer.server.port=4000"
    - "traefik.docker.network=traefik_proxy"

  worker:
    image: ghcr.io/${GHCR_OWNER:-m1xxos}/lms-parser-worker:${IMAGE_TAG:-latest}
    container_name: lms-parser-worker
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EXPORT_DIR: ${EXPORT_DIR:-/app/exports}
    networks:
      - lms
    depends_on:
      redis:
        condition: service_started
    volumes:
      - exports_data:/app/exports

  web:
    image: ghcr.io/${GHCR_OWNER:-m1xxos}/lms-parser-web:${IMAGE_TAG:-latest}
    container_name: lms-parser-web
    restart: unless-stopped
    environment:
      WEB_PORT: ${WEB_PORT:-3000}
    expose:
      - "3000"
    networks:
      - lms
      - traefik_proxy
    depends_on:
      api:
        condition: service_started
    labels:
    - "traefik.enable=true"
    - "traefik.http.routers.lms-web.entrypoints=websecure"
    - "traefik.http.routers.lms-web.rule=Host(`lms.m1xxos.online`)"
    - "traefik.http.services.lms-web.loadbalancer.server.port=3000"
    - "traefik.docker.network=traefik_proxy"

  redis:
    image: redis:7-alpine
    container_name: lms-parser-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - lms

volumes:
  exports_data:

networks:
  proxy:
    external:
      name: traefik_proxy
  lms:

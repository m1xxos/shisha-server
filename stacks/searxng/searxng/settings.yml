# SearXNG settings — see https://docs.searxng.org/admin/settings/index.html
# Only overrides are listed here; everything else inherits sane defaults.

use_default_settings: true

general:
  debug: false
  instance_name: "SearXNG"

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  formats:
    - html
    - json

server:
  # Overwritten at runtime by ${SEARXNG_SECRET} from the environment.
  secret_key: "ultrasecretkey"
  limiter: true
  image_proxy: true
  # Overwritten at runtime by ${SEARXNG_BASE_URL}.
  # base_url: https://search.home.m1xxos.online/

valkey:
  # Overwritten at runtime by ${SEARXNG_VALKEY_URL}.
  url: valkey://localhost:6379/0

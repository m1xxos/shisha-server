services:
  feishin:
      container_name: feishin
      image: 'ghcr.io/jeffvli/feishin:1.11'
      restart: unless-stopped
      environment:
        - SERVER_NAME=navidrome # pre-defined server name
        - SERVER_LOCK=true # When true AND name/type/url are set, only username/password can be toggled
        - SERVER_TYPE=navidrome # the allowed types are: jellyfin, navidrome, subsonic. These values are case insensitive
        - SERVER_URL=https://music.home.m1xxos.online # http://address:port or https://address:port
        - REMOTE_URL=https://music.m1xxos.online # http://address or https://address
        - LEGACY_AUTHENTICATION=false # When SERVER_LOCK is true, sets the legacy (plaintext) authentication flag for Subsonic/OpenSubsonic servers
        - ANALYTICS_DISABLED=true # Set to true to disable Umami analytics tracking
      expose:
        - 9180
      networks:
        - proxy
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.feishin.entrypoints=websecure"
        - "traefik.http.services.feishin.loadbalancer.server.port=9180"
        - "traefik.http.routers.feishin.rule=Host(`feishin.home.m1xxos.online`)"
  downloader:
    image: ghcr.io/m1xxos/music-parser:sha-6013d69
    container_name: music-parser
    restart: unless-stopped
    expose:
      - 8080
    networks:
      - proxy
    environment:
      OUTPUT_ROOT: /data/music
      TMP_ROOT: /data/tmp
      DEFAULT_AUDIO_FORMAT: mp3
      DEFAULT_AUDIO_QUALITY: "320"
      HTTP_TIMEOUT_SECONDS: "20"
    user: "568:568" 
    tmpfs:
      - /data/tmp:mode=766,uid=568,gid=568
    volumes:
      - music:/data/music
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mparser.entrypoints=websecure"
      - "traefik.http.services.mparser.loadbalancer.server.port=8080"
      - "traefik.http.routers.mparser.rule=Host(`mparser.home.m1xxos.online`)"
networks:
  proxy:
    external:
      name: traefik_proxy

volumes:
  music:
    external:
      name: music

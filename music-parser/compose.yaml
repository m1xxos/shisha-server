services:
  music-parser:
    build:
      context: .
      dockerfile: Dockerfile
    image: music-parser:latest
    container_name: music-parser
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - OUTPUT_DIR=${OUTPUT_DIR:-/music}
    volumes:
      - ${MUSIC_DIR:-music}:/music
    expose:
      - 8000
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.music-parser.entrypoints=websecure"
      - "traefik.http.routers.music-parser.rule=Host(`${DOMAIN:-music-parser.home.example.com}`)"
      - "traefik.http.routers.music-parser.tls=true"
      - "traefik.http.services.music-parser.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik_proxy"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

networks:
  proxy:
    name: traefik_proxy
    external: true

volumes:
  music:
    name: music
    external: true
